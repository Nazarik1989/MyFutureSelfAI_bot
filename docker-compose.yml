services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: future_self
      POSTGRES_USER: future_self
      POSTGRES_PASSWORD: future_self
    ports:
      # Local development only. Never expose demo credentials on a public interface.
      - "127.0.0.1:5432:5432"
    volumes:
      - future_self_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U future_self"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional PR #24 worker. It uses the application image but receives no bot,
  # AI, STT, proxy, or env-file secrets and has no network namespace.
  knowledge-runner:
    profiles: ["knowledge"]
    image: future-self-bot:${APP_SHA:-local}
    build:
      context: .
    command: ["sh", "-c", "umask 077 && exec future-self-knowledge-runner"]
    restart: unless-stopped
    stop_grace_period: 180s
    user: "10001:10001"
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    cpus: 1.0
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/future_self.db
      ENABLE_KNOWLEDGE_RUNNER: "true"
      KNOWLEDGE_ASSET_ROOT: /data/knowledge
      KNOWLEDGE_RUNNER_CONCURRENCY: "1"
      KNOWLEDGE_RUNNER_POLL_SECONDS: "2"
      KNOWLEDGE_RUNNER_LEASE_SECONDS: "120"
      KNOWLEDGE_RUNNER_HEARTBEAT_SECONDS: "30"
      KNOWLEDGE_MAX_SOURCE_BYTES: "26214400"
      KNOWLEDGE_EXTRACTION_WALL_SECONDS: "30"
      KNOWLEDGE_EXTRACTION_MAX_PAGES: "500"
      KNOWLEDGE_EXTRACTION_MAX_ARCHIVE_ENTRIES: "2000"
      KNOWLEDGE_EXTRACTION_MAX_UNPACKED_BYTES: "104857600"
      KNOWLEDGE_EXTRACTION_MAX_TEXT_BYTES: "10485760"
      RUNTIME_MIN_FREE_BYTES: "1073741824"
      SQLITE_WAL_ENABLED: "true"
      SQLITE_BUSY_TIMEOUT_MS: "5000"
      LOG_LEVEL: INFO
    volumes:
      - ${KNOWLEDGE_DATA_PATH:-./data}:/data
    healthcheck:
      test: ["CMD-SHELL", "umask 077 && exec future-self-knowledge-runner --doctor"]
      interval: 60s
      timeout: 20s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

volumes:
  future_self_pgdata:
